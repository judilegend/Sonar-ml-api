name: CI/CD — Sonar ML API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: sonar-ml-api
  PYTHON_VERSION: "3.11"

jobs:
  # 🧪 JOB 1 : TESTS & LINT (Version assouplie)
  test:
    name: 🧪 Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # On ignore les erreurs d'espaces, d'imports non utilisés et de formatage
      - name: Lint — flake8 (Relaxed)
        run: |
          pip install flake8
          flake8 app/ ml/ tests/ --max-line-length=120 --ignore=E501,W291,W293,F401,W391,E302,E221,E241,E203,E226,W292

      # Pytest reste important pour vérifier que le code fonctionne
      - name: Tests — pytest
        run: |
          pytest tests/ -v --tb=short

      # On baisse le seuil de couverture à 40% pour ne pas bloquer le projet au début
      - name: Code Coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=40

  # 🐳 JOB 2 : BUILD DOCKER
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: api
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🚀 JOB 3 : PUSH DOCKER HUB
  publish:
    name: 🚀 Push Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Summary
        run: |
          echo "## 🚀 Image published to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
